<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PowerNet Role Entry</title>
  <link rel="stylesheet" href="../css/powernet.css">
</head>
<body>
  <main class="phone-stage">
    <section class="phone" data-od-id="role-entry-screen" aria-label="PowerNet role entry">
      <div class="network-bg"></div>
      <div class="android-status"><span>9:41</span><span class="status-icons"><span class="dot"></span><span>5G</span><span class="battery"><i></i></span></span></div>
      <div class="app no-nav">
        <div class="app-bar">
          <div class="logo mini-logo"><span>POWER</span><span class="net">NET</span></div>
          <span class="chip sync">Online</span>
        </div>
        <h1 class="page-title">Choose your access</h1>
        <p class="body" style="margin-top: 8px;">Open the right PowerNet workspace.</p>
        <div class="stack-lg" style="margin-top: 32px;">
          <a class="card action-card" href="03-staff-login.html">
            <span class="icon-box orange"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M12 12a4 4 0 1 0 0-8 4 4 0 0 0 0 8Z"/><path d="M4 21a8 8 0 0 1 16 0"/></svg></span>
            <span><strong>Staff Login</strong><span class="body-sm muted">Technician and recovery team.</span></span>
            <span class="arrow">-&gt;</span>
          </a>
          <a class="card action-card" href="04-customer-login.html">
            <span class="icon-box"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M4 7h16v13H4z"/><path d="M8 7V4h8v3"/></svg></span>
            <span><strong>Customer Login</strong><span class="body-sm muted">Bills, complaints, package.</span></span>
            <span class="arrow">-&gt;</span>
          </a>
          <a class="card action-card" href="05-customer-signup.html">
            <span class="icon-box"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg></span>
            <span><strong>New Signup</strong><span class="body-sm muted">Request a new connection.</span></span>
            <span class="arrow">-&gt;</span>
          </a>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
