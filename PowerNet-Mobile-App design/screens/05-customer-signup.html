<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PowerNet Customer Signup</title>
  <link rel="stylesheet" href="../css/powernet.css">
</head>
<body>
  <main class="phone-stage">
    <section class="phone" data-od-id="customer-signup-screen" aria-label="Customer signup">
      <div class="android-status"><span>9:41</span><span class="status-icons"><span class="dot"></span><span>5G</span><span class="battery"><i></i></span></span></div>
      <div class="app no-nav" data-flow>
        <div class="app-bar">
          <div>
            <h1 class="page-title">New customer</h1>
            <p class="body-sm muted">Submit connection request</p>
          </div>
          <a class="btn btn-ghost" href="02-welcome.html">Close</a>
        </div>
        <div class="stepper" data-stepper>
          <button class="is-active" data-step="personal">Personal</button>
          <button data-step="connection">Connection</button>
          <button data-step="package">Package</button>
          <button data-step="review">Review</button>
        </div>
        <form class="stack-lg" onsubmit="return false;">
          <section class="step-panel is-active" data-od-id="signup-personal-step" data-step-panel="personal">
            <div class="field"><label for="full-name">Full name</label><input class="input" id="full-name" placeholder="Customer name"></div>
            <div class="field"><label for="father-name">Father name</label><input class="input" id="father-name" placeholder="Father name"></div>
            <div class="field"><label for="cnic">CNIC</label><input class="input" id="cnic" placeholder="XXXXX-XXXXXXX-X"></div>
            <div class="field"><label for="phone">Phone</label><input class="input" id="phone" placeholder="03XX-XXXXXXX"></div>
            <div class="field"><label for="whatsapp">WhatsApp</label><input class="input" id="whatsapp" placeholder="03XX-XXXXXXX"></div>
            <button class="btn btn-primary full" type="button" data-next-step>Next</button>
          </section>
          <section class="step-panel" data-od-id="signup-connection-step" data-step-panel="connection">
            <div class="field"><label for="area">Area</label><select class="select" id="area"><option>Gulshan Block 4</option><option>North Zone</option><option>Model Colony</option></select></div>
            <div class="field"><label for="house">House ID</label><input class="input" id="house" placeholder="Optional for new line"></div>
            <div class="field"><label for="address">Address</label><textarea class="textarea" id="address" placeholder="House, street, landmark"></textarea></div>
            <div class="field"><label for="email">Email optional</label><input class="input" id="email" placeholder="name@example.com"></div>
            <button class="btn btn-primary full" type="button" data-next-step>Next</button>
          </section>
          <section class="step-panel" data-od-id="signup-package-step" data-step-panel="package">
            <div class="package-grid">
              <button class="package-card is-selected" type="button" data-package="20 Mbps"><span class="body-sm muted">Home</span><strong>20 Mbps</strong><span class="soft">PKR 2,500</span></button>
              <button class="package-card" type="button" data-package="35 Mbps"><span class="body-sm muted">Family</span><strong>35 Mbps</strong><span class="soft">PKR 3,500</span></button>
              <button class="package-card" type="button" data-package="50 Mbps"><span class="body-sm muted">Work</span><strong>50 Mbps</strong><span class="soft">PKR 4,800</span></button>
              <button class="package-card" type="button" data-package="75 Mbps"><span class="body-sm muted">Plus</span><strong>75 Mbps</strong><span class="soft">PKR 6,500</span></button>
            </div>
            <button class="btn btn-primary full" type="button" data-next-step>Review</button>
          </section>
          <section class="step-panel" data-od-id="signup-review-step" data-step-panel="review">
            <div class="card stack">
              <div class="between"><span class="soft">Name</span><strong>New customer</strong></div>
              <div class="between"><span class="soft">Area</span><strong>Gulshan Block 4</strong></div>
              <div class="between"><span class="soft">Package</span><strong>20 Mbps</strong></div>
              <div class="between"><span class="soft">Status</span><span class="chip pending">Review</span></div>
            </div>
            <button class="btn btn-primary full" type="button" data-submit="Signup request submitted. PowerNet team will review your account." data-show="signup-success">Submit Request</button>
            <div class="card receipt" id="signup-success">
              <strong>Signup request submitted.</strong>
              <p class="body">PowerNet team will review your account.</p>
            </div>
          </section>
        </form>
      </div>
      <div class="toast" data-toast></div>
    </section>
  </main>
  <script src="../js/powernet.js"></script>
</body>
</html>
