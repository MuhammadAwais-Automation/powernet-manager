<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PowerNet Staff Profile</title>
  <link rel="stylesheet" href="../css/powernet.css">
</head>
<body>
  <main class="phone-stage">
    <section class="phone" data-od-id="staff-profile-screen" aria-label="Shared staff profile">
      <div class="android-status"><span>9:41</span><span class="status-icons"><span class="dot"></span><span>5G</span><span class="battery"><i></i></span></span></div>
      <div class="app">
        <div class="app-bar">
          <div>
            <h1 class="page-title">Staff Profile</h1>
            <p class="body-sm muted">Shared field screen</p>
          </div>
          <a class="btn btn-ghost" href="09-technician-home.html">Home</a>
        </div>
        <div class="card glass stack">
          <div class="row">
            <div class="avatar">UA</div>
            <div>
              <strong style="font-size: 20px;">Usman Ali</strong>
              <p class="body-sm muted">Gulshan Block 4 - 0300-5551122</p>
              <div style="margin-top: 8px;"><span class="chip active">Active</span></div>
            </div>
          </div>
          <div class="mini-grid">
            <span class="mini-cell"><small>Username</small><strong>usman.tech</strong></span>
            <span class="mini-cell"><small>Area</small><strong>Gulshan</strong></span>
          </div>
        </div>
        <h2 class="section-title">Role stats</h2>
        <div class="tabs" style="grid-template-columns: repeat(2, 1fr);" data-tabs>
          <button class="is-active" data-tab="profile-tech">Technician</button>
          <button data-tab="profile-recovery">Recovery</button>
        </div>
        <section class="tab-panel is-active" data-od-id="profile-technician-tab" id="profile-tech">
          <div class="kpi-grid">
            <div class="card kpi"><small>Resolved Today</small><strong>6</strong></div>
            <div class="card kpi"><small>Pending</small><strong>7</strong></div>
            <div class="card kpi"><small>Queued</small><strong>3</strong></div>
            <div class="card kpi"><small>Status</small><strong class="money">Live</strong></div>
          </div>
        </section>
        <section class="tab-panel" data-od-id="profile-recovery-tab" id="profile-recovery">
          <div class="kpi-grid">
            <div class="card kpi"><small>Collected Today</small><strong class="money">PKR 58K</strong></div>
            <div class="card kpi"><small>Pending Bills</small><strong>42</strong></div>
            <div class="card kpi"><small>Visits Logged</small><strong>21</strong></div>
            <div class="card kpi"><small>Queued</small><strong>5</strong></div>
          </div>
        </section>
        <div class="stack" style="margin-top: 16px;">
          <button class="btn btn-cyan full" type="button" data-submit="Sync complete">Sync Now</button>
          <a class="btn btn-danger full" href="02-welcome.html">Logout</a>
        </div>
      </div>
      <nav class="bottom-nav" aria-label="Staff navigation">
        <a href="09-technician-home.html"><svg viewBox="0 0 24 24" stroke-width="2"><path d="M3 10.5 12 3l9 7.5V21H4z"/></svg><span>Home</span></a>
        <a href="10-technician-complaints.html"><svg viewBox="0 0 24 24" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h10"/></svg><span>Work</span></a>
        <a href="#"><svg viewBox="0 0 24 24" stroke-width="2"><path d="M18 8a6 6 0 1 0-12 0c0 7-3 7-3 7h18s-3 0-3-7"/></svg><span>Alerts</span></a>
        <a class="is-active" href="staff-profile.html"><svg viewBox="0 0 24 24" stroke-width="2"><path d="M12 12a4 4 0 1 0 0-8 4 4 0 0 0 0 8Z"/><path d="M4 21a8 8 0 0 1 16 0"/></svg><span>Profile</span></a>
      </nav>
      <div class="toast" data-toast></div>
    </section>
  </main>
  <script src="../js/powernet.js"></script>
</body>
</html>
