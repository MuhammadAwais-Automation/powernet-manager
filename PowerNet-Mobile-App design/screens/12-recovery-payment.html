<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PowerNet Collection</title>
  <link rel="stylesheet" href="../css/powernet.css">
</head>
<body>
  <main class="phone-stage">
    <section class="phone" data-od-id="recovery-payment-screen" aria-label="Recovery collection and payment">
      <div class="android-status"><span>9:41</span><span class="status-icons"><span class="dot"></span><span>5G</span><span class="battery"><i></i></span></span></div>
      <div class="app">
        <div class="app-bar">
          <div>
            <h1 class="page-title">Collections</h1>
            <p class="body-sm muted">Search customer bill</p>
          </div>
          <span class="chip sync">Online</span>
        </div>
        <div class="search-row">
          <input class="input" data-search placeholder="Search name, code, area">
          <button class="btn btn-cyan" type="button" data-submit="Search updated">Go</button>
        </div>
        <div class="stack" style="margin-top: 14px;">
          <button class="card bill-card" type="button" data-filter-item data-open-sheet="payment-detail">
            <div class="between"><strong>Adeel Khan</strong><span class="chip overdue">Overdue</span></div>
            <p class="body">PN-1024 - Gulshan Block 4 - May 2026</p>
            <div class="money-row">
              <span class="mini-cell"><small>Amount</small><strong>PKR 3,500</strong></span>
              <span class="mini-cell"><small>Remaining</small><strong>PKR 1,800</strong></span>
            </div>
          </button>
          <button class="card bill-card" type="button" data-filter-item data-open-sheet="payment-detail">
            <div class="between"><strong>Sara Imran</strong><span class="chip pending">Pending</span></div>
            <p class="body">PN-1180 - North Zone - May 2026</p>
            <div class="money-row">
              <span class="mini-cell"><small>Amount</small><strong>PKR 2,500</strong></span>
              <span class="mini-cell"><small>Remaining</small><strong>PKR 2,500</strong></span>
            </div>
          </button>
          <button class="card bill-card" type="button" data-filter-item data-open-sheet="payment-detail">
            <div class="between"><strong>Bilal Shah</strong><span class="chip partial">Partial</span></div>
            <p class="body">PN-1098 - Model Colony - April 2026</p>
            <div class="money-row">
              <span class="mini-cell"><small>Amount</small><strong>PKR 4,800</strong></span>
              <span class="mini-cell"><small>Remaining</small><strong>PKR 900</strong></span>
            </div>
          </button>
        </div>
      </div>
      <nav class="bottom-nav" aria-label="Recovery navigation">
        <a href="11-recovery-home.html"><svg viewBox="0 0 24 24" stroke-width="2"><path d="M3 10.5 12 3l9 7.5V21H4z"/></svg><span>Home</span></a>
        <a class="is-active" href="12-recovery-payment.html"><svg viewBox="0 0 24 24" stroke-width="2"><path d="M5 6h14v12H5z"/><path d="M8 10h8M8 14h4"/></svg><span>Collections</span></a>
        <a href="#"><svg viewBox="0 0 24 24" stroke-width="2"><path d="M18 8a6 6 0 1 0-12 0c0 7-3 7-3 7h18s-3 0-3-7"/></svg><span>Alerts</span></a>
        <a href="staff-profile.html"><svg viewBox="0 0 24 24" stroke-width="2"><path d="M12 12a4 4 0 1 0 0-8 4 4 0 0 0 0 8Z"/><path d="M4 21a8 8 0 0 1 16 0"/></svg><span>Profile</span></a>
      </nav>
      <div class="sheet-backdrop" id="payment-detail">
        <form class="sheet stack" onsubmit="return false;">
          <div class="sheet-handle"></div>
          <div class="between"><h2 class="section-title" style="margin: 0;">Collect Payment</h2><button class="btn btn-ghost" type="button" data-close-sheet>Close</button></div>
          <div class="card stack">
            <div class="between"><strong>Adeel Khan</strong><span class="chip overdue">Overdue</span></div>
            <p class="body">PN-1024 - May 2026 - Remaining PKR 1,800</p>
          </div>
          <div class="field"><label for="amount">Amount</label><input class="input" id="amount" value="1800"></div>
          <div class="field"><label for="method">Payment method</label><select class="select" id="method"><option>Cash</option><option>Bank transfer</option><option>JazzCash</option><option>EasyPaisa</option></select></div>
          <div class="field"><label for="receipt">Receipt number</label><input class="input" id="receipt" value="RC-2152"></div>
          <div class="field"><label for="notes">Notes</label><textarea class="textarea" id="notes" placeholder="Optional visit notes"></textarea></div>
          <button class="btn btn-primary full" type="button" data-submit="Payment collected" data-show="payment-receipt">Collect Payment</button>
          <button class="btn btn-ghost full" type="button" data-submit="Visit saved only">Save Visit Only</button>
          <button class="btn btn-danger full" type="button" data-submit="House locked status saved">Mark House Locked</button>
          <button class="btn btn-cyan full" type="button" data-submit="Queued offline">Queue Offline</button>
          <div class="card receipt" id="payment-receipt">
            <strong>Receipt saved</strong>
            <p class="body">RC-2152 - PKR 1,800 - Adeel Khan</p>
          </div>
        </form>
      </div>
      <div class="toast" data-toast></div>
    </section>
  </main>
  <script src="../js/powernet.js"></script>
</body>
</html>
