<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PowerNet Splash</title>
  <link rel="stylesheet" href="../css/powernet.css">
</head>
<body>
  <main class="phone-stage">
    <section class="phone" data-od-id="splash-screen" aria-label="PowerNet splash screen">
      <div class="android-status"><span>9:41</span><span class="status-icons"><span class="dot"></span><span>5G</span><span class="battery"><i></i></span></span></div>
      <div class="app no-nav">
        <div class="splash-panel">
          <div class="splash-orbit" aria-hidden="true">
            <span class="signal-line one"></span>
            <span class="signal-line two"></span>
            <div class="power-core"><span class="power-symbol"></span></div>
          </div>
          <div class="logo" style="justify-content: center;"><span>POWER</span><span class="net">NET</span></div>
          <p class="tagline" style="margin-top: 10px;">Future of Connectivity &amp; Beyond</p>
          <div class="splash-status">
            <div class="between">
              <span class="body-sm soft">Network status</span>
              <span class="chip sync">Live</span>
            </div>
            <div class="mini-grid" style="margin-top: 12px;">
              <span class="mini-cell"><small>Signal</small><strong>Stable</strong></span>
              <span class="mini-cell"><small>Sync</small><strong>Ready</strong></span>
            </div>
          </div>
          <div style="margin-top: 22px; text-align: center;">
            <p class="body-sm soft">Connecting services...</p>
            <div class="loader"><span></span></div>
          </div>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
