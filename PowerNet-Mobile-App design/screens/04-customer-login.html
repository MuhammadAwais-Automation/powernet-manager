<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PowerNet Customer Login</title>
  <link rel="stylesheet" href="../css/powernet.css">
</head>
<body>
  <main class="phone-stage">
    <section class="phone" data-od-id="customer-login-screen" aria-label="Customer login">
      <div class="android-status"><span>9:41</span><span class="status-icons"><span class="dot"></span><span>5G</span><span class="battery"><i></i></span></span></div>
      <div class="app no-nav">
        <div class="app-bar">
          <div class="logo mini-logo"><span>POWER</span><span class="net">NET</span></div>
          <a class="btn btn-ghost" href="02-welcome.html">Back</a>
        </div>
        <h1 class="page-title">Customer portal</h1>
        <p class="body" style="margin-top: 8px;">Log in with your house ID, phone, or customer code.</p>
        <form class="stack-lg" style="margin-top: 24px;" onsubmit="return false;">
          <div class="field">
            <label for="customer-code">House ID / Phone / Customer Code</label>
            <input class="input" id="customer-code" placeholder="PN-1024 or 03XX">
          </div>
          <div class="field">
            <label for="customer-pass">Password</label>
            <input class="input" id="customer-pass" type="password" placeholder="password">
          </div>
          <a class="btn btn-primary full" href="06-customer-home.html">Login to Customer Portal</a>
          <a class="btn btn-ghost full" href="05-customer-signup.html">Create new customer account</a>
        </form>
        <h2 class="section-title">Quick access</h2>
        <div class="feature-strip">
          <span>Bills</span>
          <span>Complaints</span>
          <span>Package</span>
          <span>Profile</span>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
