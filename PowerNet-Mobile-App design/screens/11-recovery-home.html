<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PowerNet Recovery Home</title>
  <link rel="stylesheet" href="../css/powernet.css">
</head>
<body>
  <main class="phone-stage">
    <section class="phone" data-od-id="recovery-home-screen" aria-label="Recovery agent home">
      <div class="android-status"><span>9:41</span><span class="status-icons"><span class="dot"></span><span>5G</span><span class="battery"><i></i></span></span></div>
      <div class="app">
        <div class="app-bar">
          <div>
            <p class="body-sm muted">Recovery Agent</p>
            <h1 class="page-title">Naveed Raza</h1>
          </div>
          <a class="chip sync" href="staff-profile.html">Profile</a>
        </div>
        <div class="sync-banner between">
          <div>
            <strong>Collection route</strong>
            <p class="body-sm muted">North Zone - 18 visits left</p>
          </div>
          <span class="chip open">Live</span>
        </div>
        <h2 class="section-title">Payments</h2>
        <div class="kpi-grid">
          <div class="card kpi"><small>Pending Bills</small><strong>42</strong></div>
          <div class="card kpi"><small>Overdue Bills</small><strong>16</strong></div>
          <div class="card kpi"><small>Collected Today</small><strong class="money">PKR 58K</strong></div>
          <div class="card kpi"><small>Visits Logged</small><strong>21</strong></div>
        </div>
        <div class="card kpi" style="margin-top: 10px;"><small>Offline Queue</small><strong>5</strong></div>
        <a class="btn btn-primary full" style="margin-top: 16px;" href="12-recovery-payment.html">Open Collection List</a>
      </div>
      <nav class="bottom-nav" aria-label="Recovery navigation">
        <a class="is-active" href="11-recovery-home.html"><svg viewBox="0 0 24 24" stroke-width="2"><path d="M3 10.5 12 3l9 7.5V21H4z"/></svg><span>Home</span></a>
        <a href="12-recovery-payment.html"><svg viewBox="0 0 24 24" stroke-width="2"><path d="M5 6h14v12H5z"/><path d="M8 10h8M8 14h4"/></svg><span>Collections</span></a>
        <a href="#"><svg viewBox="0 0 24 24" stroke-width="2"><path d="M18 8a6 6 0 1 0-12 0c0 7-3 7-3 7h18s-3 0-3-7"/></svg><span>Alerts</span></a>
        <a href="staff-profile.html"><svg viewBox="0 0 24 24" stroke-width="2"><path d="M12 12a4 4 0 1 0 0-8 4 4 0 0 0 0 8Z"/><path d="M4 21a8 8 0 0 1 16 0"/></svg><span>Profile</span></a>
      </nav>
    </section>
  </main>
</body>
</html>
