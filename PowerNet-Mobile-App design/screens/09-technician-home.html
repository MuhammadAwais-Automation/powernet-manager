<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PowerNet Technician Home</title>
  <link rel="stylesheet" href="../css/powernet.css">
</head>
<body>
  <main class="phone-stage">
    <section class="phone" data-od-id="technician-home-screen" aria-label="Technician home">
      <div class="android-status"><span>9:41</span><span class="status-icons"><span class="dot"></span><span>5G</span><span class="battery"><i></i></span></span></div>
      <div class="app">
        <div class="app-bar">
          <div>
            <p class="body-sm muted">Technician</p>
            <h1 class="page-title">Usman Ali</h1>
          </div>
          <a class="chip sync" href="staff-profile.html">Profile</a>
        </div>
        <div class="sync-banner between">
          <div>
            <strong id="sync-status">Online Sync</strong>
            <p class="body-sm muted">Assigned area: Gulshan Block 4</p>
          </div>
          <button class="btn btn-cyan" type="button" data-state="sync-status" data-status="Synced Now" data-class="soft">Sync</button>
        </div>
        <h2 class="section-title">Today</h2>
        <div class="kpi-grid">
          <div class="card kpi"><small>Assigned</small><strong>18</strong></div>
          <div class="card kpi"><small>Open</small><strong>7</strong></div>
          <div class="card kpi"><small>In Progress</small><strong>4</strong></div>
          <div class="card kpi"><small>Resolved Today</small><strong>6</strong></div>
        </div>
        <div class="card kpi" style="margin-top: 10px;"><small>Queued Offline Actions</small><strong>3</strong></div>
        <a class="btn btn-primary full" style="margin-top: 16px;" href="10-technician-complaints.html">View Complaints</a>
      </div>
      <nav class="bottom-nav" aria-label="Technician navigation">
        <a class="is-active" href="09-technician-home.html"><svg viewBox="0 0 24 24" stroke-width="2"><path d="M3 10.5 12 3l9 7.5V21H4z"/></svg><span>Home</span></a>
        <a href="10-technician-complaints.html"><svg viewBox="0 0 24 24" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h10"/></svg><span>Complaints</span></a>
        <a href="#"><svg viewBox="0 0 24 24" stroke-width="2"><path d="M18 8a6 6 0 1 0-12 0c0 7-3 7-3 7h18s-3 0-3-7"/></svg><span>Alerts</span></a>
        <a href="staff-profile.html"><svg viewBox="0 0 24 24" stroke-width="2"><path d="M12 12a4 4 0 1 0 0-8 4 4 0 0 0 0 8Z"/><path d="M4 21a8 8 0 0 1 16 0"/></svg><span>Profile</span></a>
      </nav>
      <div class="toast" data-toast></div>
    </section>
  </main>
  <script src="../js/powernet.js"></script>
</body>
</html>
